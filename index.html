<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos MVC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">📇 Agenda de Contatos</h2>

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body">
                <form id="form-agenda">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" name="nome" class="form-control" placeholder="Nome" required>
                        </div>
                        <div class="col-md-3">
                            <input type="tel" name="telefone" class="form-control" placeholder="Telefone" required>
                        </div>
                        <div class="col-md-3">
                            <input type="email" name="email" class="form-control" placeholder="E-mail" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">Adicionar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th><th>Telefone</th><th>E-mail</th><th>Ações</th>
                </tr>
            </thead>
            <tbody id="tbl-contatos"></tbody>
        </table>
    </div>

    <script type="module" src="main.mjs"></script>
</body>
</html>
